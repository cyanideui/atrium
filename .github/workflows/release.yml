name: Release

# Publishes on a version tag:
#   @cyanideui/ui → GitHub Packages (private-capable, scoped)
#   cyanideui (CLI) → public npmjs.com (so `pnpm dlx cyanideui` is tokenless)
#
# Trigger:
#   git tag v1.0.1 && git push origin v1.0.1
#
# Secrets required:
#   GITHUB_TOKEN  — auto-provided, used for the @cyanideui/ui publish
#   NPM_TOKEN     — a public-npm automation token, set in repo Settings →
#                   Secrets → Actions. Used for the public CLI publish.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build, test, publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # --- Gate: everything green before anything publishes ---
      - name: Build library
        run: pnpm --filter @cyanideui/ui build

      - name: Test library
        run: pnpm --filter @cyanideui/ui test

      - name: Build CLI (bundles the registry)
        run: pnpm --filter cyanideui build

      - name: Test CLI
        run: pnpm --filter cyanideui test

      - name: Typecheck workspace
        run: pnpm typecheck

      # --- Publish @cyanideui/ui → GitHub Packages ---
      - name: Configure npm for GitHub Packages (@cyanideui scope)
        run: |
          echo "@cyanideui:registry=https://npm.pkg.github.com" > "$HOME/.npmrc"
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> "$HOME/.npmrc"

      - name: Publish @cyanideui/ui
        run: pnpm --filter @cyanideui/ui publish --no-git-checks --ignore-scripts

      # --- Publish cyanideui (CLI) → public npmjs.com ---
      - name: Configure npm for public registry
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > "$HOME/.npmrc"

      - name: Publish cyanideui (public CLI)
        run: pnpm --filter cyanideui publish --no-git-checks --ignore-scripts

      - name: Summary
        run: |
          echo "### Published :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`@cyanideui/ui\` → GitHub Packages" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`cyanideui\` (CLI) → public npmjs.com" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
