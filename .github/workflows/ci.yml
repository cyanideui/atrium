name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm --filter @cyanideui/ui build

      - name: Test library
        run: pnpm --filter @cyanideui/ui test

      - name: Build registry index
        run: node scripts/build-registry-index.mjs

      - name: Build CLI
        run: pnpm --filter cyanideui build

      - name: Test CLI
        run: pnpm --filter cyanideui test

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build playground
        run: pnpm --filter @cyanideui/playground build

      - name: Build Next.js example
        run: pnpm --filter @cyanideui/example-next build
